<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlottiPay — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#04070d;--bg2:#07091400;--bg3:#0b1120;
  --card:#0f1724;--card2:#141e30;--card3:#192440;
  --border:#1a2538;--border2:#22304a;--border3:#2e4060;
  --purple:#b09fff;--purple2:#7c5cf0;
  --accent:#00e896;--accent2:#3d8bff;
  --yellow:#ffc94d;--red:#ff3d5a;--warn:#ff5c38;
  --text:#e2eaf8;--muted:#3a4d6a;--muted2:#607090;--muted3:#8fa3c8;
  --r:14px;--r2:10px;--r3:7px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;color:var(--text);display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(176,159,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(176,159,255,.022) 1px,transparent 1px);background-size:48px 48px;}
body::after{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:400px;border-radius:50%;pointer-events:none;z-index:0;background:radial-gradient(ellipse,rgba(176,159,255,.06) 0%,transparent 70%);}
.view{display:none;flex-direction:column;height:100%;position:relative;z-index:1;}
.view.active{display:flex;}

/* LOGIN */
#login{align-items:center;justify-content:center;padding:20px;}
.lw{width:100%;max-width:400px;}
.llogo{text-align:center;margin-bottom:28px;}
.llogo-ico{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--purple),var(--purple2));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 0 40px rgba(176,159,255,.2);}
.llogo-ico svg{width:32px;height:32px;}
.llogo-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--purple);}
.llogo-sub{font-size:12px;color:var(--muted3);margin-top:4px;}
.lbox{background:var(--card);border:1.5px solid var(--border2);border-radius:20px;padding:30px 26px;}
.ltitle{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:5px;}
.lsub{font-size:12px;color:var(--muted3);margin-bottom:22px;}
.fg{margin-bottom:13px;}
.fl{display:block;font-size:10px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.fi{width:100%;padding:12px 14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--border3);}
.lbtn{width:100%;padding:13px;border-radius:var(--r2);border:none;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;box-shadow:0 5px 20px rgba(176,159,255,.22);transition:opacity .2s,transform .15s;margin-top:4px;}
.lbtn:hover{opacity:.9;transform:translateY(-1px);}
.err{padding:9px 12px;background:rgba(255,61,90,.08);border:1px solid rgba(255,61,90,.2);border-radius:var(--r3);font-size:12px;color:var(--red);margin-bottom:13px;display:none;}
.llink{text-align:center;margin-top:14px;font-size:11px;color:var(--muted);}
.llink a{color:var(--purple);text-decoration:none;}

/* APP SHELL */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.tbl{display:flex;align-items:center;gap:10px;}
.tblogo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--purple),var(--purple2));display:flex;align-items:center;justify-content:center;}
.tblogo svg{width:16px;height:16px;}
.tbtitle{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;}
.tbsub{font-size:10px;color:var(--muted2);}
.tbr{display:flex;align-items:center;gap:8px;}
.tbadge{padding:4px 10px;border-radius:11px;font-size:10px;font-weight:700;font-family:'Syne',sans-serif;background:rgba(176,159,255,.1);color:var(--purple);border:1px solid rgba(176,159,255,.22);}
.lout{padding:5px 10px;border-radius:7px;background:rgba(255,61,90,.08);border:1px solid rgba(255,61,90,.18);color:var(--red);font-size:11px;font-weight:600;cursor:pointer;}
.abody{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.bottomnav{display:flex;align-items:center;justify-content:space-around;background:var(--card);border-top:1px solid var(--border2);flex-shrink:0;padding:6px 0 10px;}
.sn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 18px;border-radius:var(--r2);cursor:pointer;transition:background .15s;flex:1;}
.sn:hover{background:rgba(255,255,255,.04);}
.sn.active{background:rgba(176,159,255,.08);}
.sn-ico{font-size:22px;}
.sn-lbl{font-size:10px;font-weight:600;color:var(--muted3);letter-spacing:.3px;}
.sn.active .sn-lbl{color:var(--purple);}
.mc{flex:1;overflow-y:auto;padding:18px;}
.mc::-webkit-scrollbar{width:4px;}
.mc::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* COMPONENTS */
.pt{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:4px;}
.ps{font-size:12px;color:var(--muted3);margin-bottom:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:13px;}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.st{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;}
.sa{font-size:11px;color:var(--accent2);font-weight:600;cursor:pointer;}
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sc{background:var(--card2);border:1px solid var(--border);border-radius:var(--r2);padding:13px;}
.slbl{font-size:10px;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.sval{font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:700;}
.sdelta{font-size:10px;color:var(--muted2);margin-top:2px;}
.sdelta.up{color:var(--accent);}
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;}
.pg{background:rgba(0,232,150,.09);color:var(--accent);border:1px solid rgba(0,232,150,.2);}
.pr{background:rgba(255,61,90,.09);color:var(--red);border:1px solid rgba(255,61,90,.2);}
.py{background:rgba(255,201,77,.09);color:var(--yellow);border:1px solid rgba(255,201,77,.2);}
.pp{background:rgba(176,159,255,.09);color:var(--purple);border:1px solid rgba(176,159,255,.2);}
.po{background:rgba(255,92,56,.09);color:var(--warn);border:1px solid rgba(255,92,56,.2);}
.li{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);}
.li:last-child{border-bottom:none;}
.liico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.libody{flex:1;min-width:0;}
.lititle{font-size:13px;font-weight:600;}
.lisub{font-size:11px;color:var(--muted2);margin-top:1px;}
.lbl{font-size:10px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;display:block;}
.fi2{width:100%;padding:10px 12px;background:var(--card2);border:1.5px solid var(--border2);border-radius:var(--r2);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
.fi2::placeholder{color:var(--muted);}
.keybox{background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--r2);padding:12px 14px;display:flex;align-items:center;gap:10px;}
.keytext{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--purple);letter-spacing:1px;flex:1;}
.keycopy{padding:5px 11px;border-radius:7px;background:rgba(176,159,255,.1);border:1px solid rgba(176,159,255,.22);color:var(--purple);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Syne',sans-serif;}
.pbar{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;}
.pfill{height:100%;border-radius:3px;}
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px;}
.pcard{border-radius:var(--r2);padding:13px;border:1.5px solid var(--border);background:var(--card2);cursor:pointer;transition:all .15s;}
.pcard:hover{border-color:var(--border3);}
.pcard.sel{border-color:var(--purple);background:rgba(176,159,255,.06);}
.pcard.pop{border-color:rgba(176,159,255,.3);}
.pname{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;}
.pprice{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:var(--purple);margin:3px 0;}
.pfeat{font-size:10px;color:var(--muted3);line-height:1.6;}
.kgvis{background:linear-gradient(135deg,rgba(176,159,255,.07),rgba(61,139,255,.05));border:1.5px solid rgba(176,159,255,.2);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:14px;}
.kgkey{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:var(--purple);letter-spacing:2px;margin:11px 0;padding:13px;background:rgba(0,0,0,.3);border-radius:var(--r2);}
.btn{padding:10px 18px;border-radius:var(--r2);border:none;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .2s;}
.btn:hover{opacity:.88;}
.btnp{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;}
.btnb{background:linear-gradient(135deg,var(--accent2),#1a5acc);color:#fff;}
.btng{background:linear-gradient(135deg,var(--accent),#00b87c);color:#000;}
.btnr{background:rgba(255,61,90,.15);border:1px solid rgba(255,61,90,.25);color:var(--red);}
.btnw{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.action-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:none;font-family:'Syne',sans-serif;margin-right:3px;}
.spin{display:inline-block;width:22px;height:22px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--purple);animation:spin .7s linear infinite;}
.loader{display:flex;align-items:center;justify-content:height:200px;gap:10px;color:var(--muted2);font-size:12px;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:9px 18px;font-size:12px;font-weight:600;color:var(--text);z-index:200;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="view active">
  <div class="lw">
    <div class="llogo">
      <div class="llogo-ico">
        <svg viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="15" stroke="#fff" stroke-width="2"/><circle cx="18" cy="18" r="5.5" fill="#fff"/><path d="M18 7v3M18 26v3M7 18h3M26 18h3" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div class="llogo-title">FlottiPay</div>
      <div class="llogo-sub">Portail Administrateur — Accès restreint</div>
    </div>
    <div class="lbox">
      <div class="ltitle">Connexion Admin</div>
      <div class="lsub">Réservé au personnel autorisé FlottiPay</div>
      <div class="err" id="lerr"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="lemail" placeholder="admin@flottipay.com" value="frejusglessougbe@gmail.com"></div>
      <div class="fg"><label class="fl">Mot de passe</label><input class="fi" type="password" id="lpass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="lbtn" id="lbtn" onclick="doLogin()">Accéder au portail →</button>
    </div>
    <div class="llink">Espace client ? <a href="flottipay-app.html">→ Propriétaire / Gérant</a></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="view">
  <div class="topbar">
    <div class="tbl">
      <div class="tblogo"><svg viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="15" stroke="#fff" stroke-width="2"/><circle cx="18" cy="18" r="5.5" fill="#fff"/></svg></div>
      <div><div class="tbtitle">FlottiPay Admin</div><div class="tbsub" id="adminEmail">—</div></div>
    </div>
    <div class="tbr"><div class="tbadge">🛡️ ADMIN</div><div class="lout" onclick="doLogout()">Déconnexion</div></div>
  </div>
  <div class="abody">
    <div class="mc" id="mc"><div class="loader"><div class="spin"></div>Chargement...</div></div>
    <div class="bottomnav">
      <div class="sn active" id="sn0" onclick="goP(0)"><div class="sn-ico">📊</div><div class="sn-lbl">Tableau</div></div>
      <div class="sn" id="sn1" onclick="goP(1)"><div class="sn-ico">🔑</div><div class="sn-lbl">Licences</div></div>
      <div class="sn" id="sn2" onclick="goP(2)"><div class="sn-ico">✨</div><div class="sn-lbl">Keygen</div></div>
      <div class="sn" id="sn3" onclick="goP(3)"><div class="sn-ico">👑</div><div class="sn-lbl">Propriétaires</div></div>
      <div class="sn" id="sn4" onclick="goP(4)"><div class="sn-ico">💰</div><div class="sn-lbl">Recettes</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══ SUPABASE CONFIG ══════════════════════════════════════ */
const SB_URL  = 'https://yweojpsawxkwyfwqqttt.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3ZW9qcHNhd3hrd3lmd3FxdHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDQ3NDEsImV4cCI6MjA5MjEyMDc0MX0.pGlUyns7b-kT3LHj_-nnqYtYeItcUv-_duTG9gCPzu8';
const ADMIN_EMAIL = 'frejusglessougbe@gmail.com';

const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

const PLANS=[
  {id:'mensuel', icon:'📅',name:'Mensuel',    price:'1 500 F', priceN:1500, days:30, feat:'Gérants illimités · 30 jours'},
  {id:'trim',    icon:'📆',name:'Trimestriel',price:'4 000 F', priceN:4000, days:90, feat:'Gérants illimités · 90 jours',pop:true},
  {id:'annuel',  icon:'🗓️',name:'Annuel',     price:'15 000 F',priceN:15000,days:365,feat:'Gérants illimités · 365 jours'},
];

/* ══ ÉTAT GLOBAL ══ */
let currentPlan = null; // ← renommé (était selPlan, en conflit avec la fonction selPlan)
let genKey = null;
let curPage = 0;

/* ══ HELPERS ══ */
function toast(m,d=2400){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function fmt(n){return Number(n||0).toLocaleString('fr-FR');}
function fmtK(n){n=Number(n||0);return n>=1000000?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'k':String(n);}
function dl(d){return d?Math.max(0,Math.floor((new Date(d)-new Date())/864e5)):0;}
function seg(){return Math.random().toString(36).substr(2,4).toUpperCase();}
function cpKey(k){try{navigator.clipboard.writeText(k);}catch(e){}toast('🔑 Clé copiée : '+k);}

/* ══ AUTH ══ */
async function doLogin(){
  const email=document.getElementById('lemail').value.trim();
  const pass=document.getElementById('lpass').value;
  const err=document.getElementById('lerr');
  const btn=document.getElementById('lbtn');
  err.style.display='none';
  if(email!==ADMIN_EMAIL){err.textContent='Accès refusé : compte non autorisé.';err.style.display='block';return;}
  if(!pass){err.textContent='Mot de passe requis.';err.style.display='block';return;}
  btn.textContent='Connexion...';btn.disabled=true;
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent='Identifiants incorrects.';err.style.display='block';btn.textContent='Accéder au portail →';btn.disabled=false;return;}
  document.getElementById('adminEmail').textContent=email;
  showApp();
}
async function doLogout(){await sb.auth.signOut();document.getElementById('app').classList.remove('active');document.getElementById('login').classList.add('active');}
function showApp(){document.getElementById('login').classList.remove('active');document.getElementById('app').classList.add('active');goP(0);}
async function checkSession(){const{data:{session}}=await sb.auth.getSession();if(session&&session.user.email===ADMIN_EMAIL){document.getElementById('adminEmail').textContent=session.user.email;showApp();}}

/* ══ NAV ══ */
function goP(n){
  curPage=n;
  [0,1,2,3,4].forEach(i=>{document.getElementById('sn'+i).classList.toggle('active',i===n);});
  [pageDash,pageLic,pageKg,pageOwners,pageRev][n]();
}

/* ══ DASHBOARD ══ */
async function pageDash(){
  const mc=document.getElementById('mc');
  mc.innerHTML='<div class="loader"><div class="spin"></div>Chargement...</div>';
  const[{data:dash},{data:lics}]=await Promise.all([
    sb.from('admin_dashboard').select('*'),
    sb.from('licenses').select('*'),
  ]);
  const rows=dash||[];
  const totalTx=rows.reduce((a,r)=>a+Number(r.total_tx||0),0);
  const totalAmt=rows.reduce((a,r)=>a+Number(r.total_amount||0),0);
  const totalComm=rows.reduce((a,r)=>a+Number(r.total_commission||0),0);
  const totalRev=(lics||[]).reduce((a,l)=>a+(PLANS.find(p=>p.name===l.plan)?.priceN||0),0);
  const active=(lics||[]).filter(l=>l.status==='active').length;
  const expSoon=rows.filter(r=>r.license_status==='active'&&dl(r.end_date)<=7&&dl(r.end_date)>0);
  const pc={Mensuel:0,Trimestriel:0,Annuel:0};
  (lics||[]).forEach(l=>{if(pc[l.plan]!==undefined)pc[l.plan]++;});

  mc.innerHTML=`
  <div class="pt">Tableau de bord</div>
  <div class="ps">${new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
  <div class="sg4">
    <div class="sc"><div class="slbl">Licences actives</div><div class="sval" style="color:var(--accent);">${active}</div><div class="sdelta">${rows.length} propriétaires</div></div>
    <div class="sc"><div class="slbl">Transactions totales</div><div class="sval" style="color:var(--accent2);">${fmt(totalTx)}</div><div class="sdelta">toutes cabines</div></div>
    <div class="sc"><div class="slbl">Volume total transité</div><div class="sval" style="color:var(--yellow);font-size:16px;">${fmtK(totalAmt)} F</div><div class="sdelta up">↑ cumulé</div></div>
    <div class="sc"><div class="slbl">Commissions totales</div><div class="sval" style="color:var(--accent);font-size:16px;">${fmtK(totalComm)} F</div><div class="sdelta up">↑ cumulé</div></div>
  </div>
  <div class="sg2">
    <div class="card">
      <div class="sh"><div class="st">Répartition plans</div></div>
      ${PLANS.map(p=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);"><div style="display:flex;align-items:center;gap:8px;"><span>${p.icon}</span><div><div style="font-size:12px;font-weight:700;">${p.name}</div><div style="font-size:10px;color:var(--muted2);">${p.price}/période</div></div></div><div style="font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700;color:var(--purple);">${pc[p.name]||0}</div></div>`).join('')}
      <div style="padding-top:10px;display:flex;justify-content:space-between;"><div style="font-size:11px;color:var(--muted2);">Recettes admin totales</div><div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--yellow);">${fmtK(totalRev)} F</div></div>
    </div>
    <div class="card">
      <div class="sh"><div class="st">⚠️ Expirations ≤ 7 jours</div></div>

async function revokeLic(key,name){
  if(!key||!confirm(`Révoquer la licence de ${name} ?\n\nCela bloquera immédiatement l'accès au propriétaire et à tous ses gérants.`))return;
  const{error}=await sb.from('licenses').update({status:'revoked'}).eq('key',key);
  if(error){toast('❌ Erreur : '+error.message);return;}
  toast(`🚫 Licence de ${name} révoquée.`);
  pageLic();
}

async function deleteOwner(ownerId,name){
  if(!ownerId||!confirm(`⚠️ SUPPRIMER ${name} ?\n\nCela supprimera :\n• Son compte\n• Tous ses gérants\n• Toutes ses transactions\n• Tous ses réseaux\n\nCette action est IRRÉVERSIBLE.`))return;
  const{error:e1}=await sb.from('owners').delete().eq('id',ownerId);
  if(e1){toast('❌ Erreur suppression profil : '+e1.message);return;}
  await sb.from('licenses').update({status:'revoked',owner_id:null}).eq('owner_id',ownerId);
  toast(`✅ ${name} et toutes ses données ont été supprimés.`);
  pageLic();
}

async function loadRecent(){

/* ── selectPlan : renommé (était selPlan, en conflit avec la variable selPlan) ── */
function selectPlan(el, pid){
  document.querySelectorAll('[data-pid]').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
  currentPlan = PLANS.find(p => p.id === pid); // ← utilise currentPlan
}

function doGen(){
  const p = currentPlan;
  if(!p){toast('⚠️ Sélectionnez un plan');return;}
  const name=document.getElementById('kgName').value.trim();
  if(!name){toast('⚠️ Entrez le nom du propriétaire');return;}
  genKey=`FP-${seg()}-${seg()}-${seg()}`;
  document.getElementById('kgKeyVal').textContent=genKey;
  document.getElementById('kgHint').textContent='Clé générée — enregistrez-la puis envoyez-la';
  document.getElementById('kgMeta').textContent=`${p.name} · ${p.days} jours · ${p.price} · Gérants illimités`;
  ['savBtn','waBtn'].forEach(id=>{const b=document.getElementById(id);b.disabled=false;b.style.opacity='1';});
  toast('⚡ Clé générée !');
}

async function doSave(){
  const p = currentPlan;
  if(!genKey||!p){toast('⚠️ Générez d\'abord une clé');return;}

  const{data:{session}}=await sb.auth.getSession();
  if(!session){toast('❌ Session expirée, reconnectez-vous.');return;}

  const end=new Date();
  end.setDate(end.getDate()+p.days);

  const{data:existing}=await sb.from('licenses').select('key').eq('key',genKey);
  if(existing&&existing.length>0){toast('⚠️ Clé déjà existante — régénérez-en une');return;}

  const{data,error}=await sb.from('licenses').insert({
    key:     genKey,
    plan:    p.name,
    days:    p.days,
    status:  'pending',
    end_date:end.toISOString().slice(0,10),
  }).select();

  if(error){
    console.error('Erreur insert licence:',error);
    if(error.code==='42501'){
      toast('❌ Permission refusée — exécutez flottipay-fix-rls.sql dans Supabase');
    } else {
      toast('❌ '+error.message);
    }
    return;
  }
  toast('✅ Licence enregistrée ! Clé : '+genKey);
  loadRecent();
  document.getElementById('savBtn').disabled=true;
  document.getElementById('savBtn').style.opacity='.4';
}

function doWA(){
  if(!genKey)return;
  const name=document.getElementById('kgName').value.trim();
  const phone=document.getElementById('kgPhone').value.trim().replace(/\s+/g,'');
  const p = currentPlan; // ← utilise currentPlan
  const msg=encodeURIComponent(
    `Bonjour ${name} 👋\n\n`+
    `Votre licence FlottiPay est prête !\n\n`+
    `🔑 *Clé de licence :*\n${genKey}\n\n`+
    `📦 Plan : ${p?.name||'—'} (${p?.days||0} jours)\n`+
    `♾️ Gérants illimités inclus\n\n`+
    `🌐 Créez votre compte ici :\n`+
    `👉 https://TON-SITE.netlify.app/flottipay-app.html\n\n`+
    `⚠️ Cette clé est personnelle et ne peut être utilisée qu'une seule fois.\n\n`+
    `_— FlottiPay, gestion de cabines mobile money_`
  );
  window.open(`https://wa.me/${phone}?text=${msg}`,'_blank');
}

/* ══ RECETTES ══ */
async function pageRev(){
  const mc=document.getElementById('mc');
  mc.innerHTML='<div class="loader"><div class="spin"></div>Chargement...</div>';
  const[{data:lics},{data:dash}]=await Promise.all([
    sb.from('licenses').select('plan,status,created_at'),
    sb.from('admin_dashboard').select('total_tx,total_amount,total_commission,tx_today,amount_today'),
  ]);
  const pr={Mensuel:0,Trimestriel:0,Annuel:0};
  (lics||[]).forEach(l=>{const p=PLANS.find(x=>x.name===l.plan);if(p)pr[l.plan]+=p.priceN;});
  const totalRev=Object.values(pr).reduce((a,v)=>a+v,0);
  const rows=dash||[];
  const totalTx=rows.reduce((a,r)=>a+Number(r.total_tx||0),0);
  const totalAmt=rows.reduce((a,r)=>a+Number(r.total_amount||0),0);
  const totalComm=rows.reduce((a,r)=>a+Number(r.total_commission||0),0);
  const todayTx=rows.reduce((a,r)=>a+Number(r.tx_today||0),0);
  const todayAmt=rows.reduce((a,r)=>a+Number(r.amount_today||0),0);

  mc.innerHTML=`
  <div class="pt">Recettes & Statistiques</div>
  <div class="ps">Vue d'ensemble financière de la plateforme</div>
  <div class="sg4">
    <div class="sc"><div class="slbl">Recettes licences</div><div class="sval" style="color:var(--yellow);font-size:16px;">${fmtK(totalRev)} F</div><div class="sdelta up">↑ cumulé</div></div>
    <div class="sc"><div class="slbl">Volume total transité</div><div class="sval" style="color:var(--accent2);font-size:16px;">${fmtK(totalAmt)} F</div><div class="sdelta">toutes cabines</div></div>
    <div class="sc"><div class="slbl">Commissions totales</div><div class="sval" style="color:var(--accent);font-size:16px;">${fmtK(totalComm)} F</div><div class="sdelta up">↑ cumulé</div></div>
    <div class="sc"><div class="slbl">Tx totales</div><div class="sval" style="color:var(--purple);">${fmt(totalTx)}</div><div class="sdelta">toutes cabines</div></div>
  </div>
  <div class="sg2">
    <div class="card">
      <div class="sh"><div class="st">Revenus par plan</div></div>
      ${PLANS.map(p=>{
        const cnt=(lics||[]).filter(l=>l.plan===p.name&&l.status==='active').length;
        const rev=pr[p.name]||0;
        const pct=totalRev>0?Math.round(rev/totalRev*100):0;
        return `<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;margin-bottom:5px;"><div style="display:flex;align-items:center;gap:7px;"><span>${p.icon}</span><span style="font-size:12px;font-weight:700;">${p.name}</span><span class="pill pg" style="font-size:9px;">${cnt} actif${cnt>1?'s':''}</span></div><div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--yellow);">${fmtK(rev)} F</div></div><div class="pbar"><div class="pfill" style="width:${pct}%;background:var(--purple)"></div></div></div>`;
      }).join('')}
      <div style="border-top:1px solid var(--border);padding-top:10px;display:flex;justify-content:space-between;"><div style="font-size:12px;font-weight:700;">TOTAL</div><div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--yellow);">${fmtK(totalRev)} F</div></div>
    </div>
    <div class="card">
      <div class="sh"><div class="st">Activité aujourd'hui</div></div>
      <div class="sg2" style="margin-bottom:0;">
        <div class="sc"><div class="slbl">Transactions</div><div class="sval" style="color:var(--accent2);">${fmt(todayTx)}</div></div>

      </div>
    </div>

}
